<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanri</title>
    <link rel="stylesheet" href="./styles/app.css" />
    <style>
      /* ===== SPLASH SCREEN ===== */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: linear-gradient(160deg, #0d0f18 0%, #080910 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }

      #splash.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .splash-logo {
        width: 110px;
        height: 110px;
        border-radius: 24px;
        background: rgba(255,255,255,.06);
        border: 1px solid rgba(255,255,255,.10);
        display: grid;
        place-items: center;
        font-size: 38px;
        font-weight: 900;
        color: rgba(255,255,255,.85);
        letter-spacing: -1px;
        animation: splash-pop 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        position: relative;
        overflow: hidden;
      }

      .splash-name {
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        font-size: 40px;
        font-weight: 900;
        letter-spacing: 4px;
        color: #e7eaf0;
        text-transform: uppercase;
        animation: splash-fadein 0.5s 0.15s ease both;
      }

      .splash-subtitle {
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        font-size: 12px;
        color: rgba(152, 160, 178, 0.7);
        letter-spacing: 2px;
        text-transform: uppercase;
        animation: splash-fadein 0.5s 0.25s ease both;
      }

      .splash-footer {
        position: absolute;
        bottom: 28px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        animation: splash-fadein 0.5s 0.35s ease both;
      }

      .splash-author {
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        font-size: 11px;
        color: rgba(152, 160, 178, 0.5);
        letter-spacing: 0.5px;
      }

      .splash-license {
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        font-size: 10px;
        color: rgba(152, 160, 178, 0.3);
        letter-spacing: 0.5px;
      }

      .splash-anime {
        position: absolute;
        top: 80px;
        right: 20px;
        width: 100px;
        height: 100px;
        opacity: 0.7;
        animation: splash-fadein 0.5s 0.3s ease both, subtle-float 3s ease-in-out infinite;
        transition: opacity 0.3s ease;
        cursor: pointer;
        z-index: 1;
      }

      .splash-anime:hover { opacity: 1; }

      .splash-anime img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 0 5px rgba(100, 150, 255, 0.3));
      }

      @keyframes subtle-float {
        0%, 100% { transform: translateY(0px);  }
        50%       { transform: translateY(-5px); }
      }

      @media (max-width: 768px) {
        .splash-anime { width: 50px; height: 50px; top: 70px; right: 15px; }
      }

      @keyframes splash-pop {
        from { transform: scale(0.82); opacity: 0; }
        to   { transform: scale(1);    opacity: 1; }
      }

      @keyframes splash-fadein {
        from { transform: translateY(6px); opacity: 0; }
        to   { transform: translateY(0);   opacity: 1; }
      }
    </style>
  </head>
  <body>

    <div id="splash">
      <div class="splash-logo">
        <img id="splash-icon" src="" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:24px;display:none;" />
        <span id="splash-icon-fallback" style="font-size:38px;font-weight:900;">K</span>
      </div>
      <div class="splash-name">Kanri</div>
      <div class="splash-subtitle">Sistema de gestión de inventario para el laboratorio de cómputo I</div>

      <div class="splash-anime">
        <img id="splash-gif" src="" alt="" style="display:none;" />
      </div>

      <div class="splash-footer">
        <div class="splash-author">Desarrollado por @VICTORONJA-MN</div>
        <div class="splash-license">Licencia MIT · v1.0.0</div>
      </div>
    </div>

    <div id="app"></div>
    <div id="modal-root" class="modal-root" aria-hidden="true"></div>

    <script type="module" src="./js/app.js"></script>
    <script>
      // Resuelve la ruta de assets via IPC (funciona en dev y producción)
      // y la guarda en window.__ASSETS_PATH__ para que notify.js también la use
      window.api.getAssetsPath().then(function(assetsPath) {
        const base = 'file:///' + assetsPath.replace(/^\/+/, '');

        // Icono del splash
        const icon = document.getElementById('splash-icon');
        const fallback = document.getElementById('splash-icon-fallback');
        icon.src = base + '/icon.png';
        icon.onload = function() {
          icon.style.display = 'block';
          fallback.style.display = 'none';
        };
        icon.onerror = function() {
        
          icon.src = base + '/icon.png';
          icon.onload = function() {
            icon.style.display = 'block';
            fallback.style.display = 'none';
          };
        };

        // Gif del splash
        const gif = document.getElementById('splash-gif');
        gif.src = base + '/mona.gif';
        gif.onload = function() { gif.style.display = 'block'; };

        // Guardar ruta global para notify.js y cualquier otro módulo
        window.__ASSETS_PATH__ = base;
      }).catch(function() {
        // Si falla el IPC el splash sigue con la K de fallback
      });

      // Ocultar splash después de 2.2s
      setTimeout(function() {
        const splash = document.getElementById('splash');
        if (splash) splash.classList.add('hide');
        setTimeout(function() { splash && splash.remove(); }, 650);
      }, 2200);
    </script>
  </body>
</html>
